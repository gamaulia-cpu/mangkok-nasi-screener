name: Mangkuk Nasi Screener
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 1-5"

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python screener.py --all-idx --all --csv hasil_screener.csv
      - uses: actions/upload-artifact@v4
        with:
          name: hasil-screener
          path: hasil_screener.csv
      - run: python report.py hasil_screener.csv
      - uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.md
