name: Mangkuk Nasi Screener
on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "30 10 * * 1-5"

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python screener.py stocks.txt --all --csv hasil_screener.csv
      - uses: actions/upload-artifact@v4
        with:
          name: hasil-screener
          path: hasil_screener.csv
      - name: Generate Report
        run: |
          python3 << 'PYEOF'
import csv, datetime
rows = []
with open('hasil_screener.csv') as f:
    for r in csv.DictReader(f):
        rows.append(r)
perfect = [r for r in rows if int(r['score']) == 65]
now = datetime.datetime.now().strftime('%Y-%m-%d %H:%M WIB')
md = '# Mangkuk Nasi Screener Report\n\n'
md += f'**Tanggal:** {now}\n\n'
md += f'**Total saham discan:** {len(rows)}\n\n'
md += '## Sinyal 65/65\n\n'
if perfect:
    md += '| Symbol | Close | Volume | Fase |\n|--------|-------|--------|------|\n'
    for r in perfect:
        md += f"| {r['symbol']} | {r['close']} | {r['volume']} | {r['fase']} |\n"
else:
    md += 'Tidak ada sinyal 65/65.\n\n'
md += '## Semua Score\n\n'
md += '| Symbol | Score | Fase | Bowl | Trend | Vol Contract | Spring |\n'
md += '|--------|-------|------|------|-------|-------------|--------|\n'
for r in rows:
    md += f"| {r['symbol']} | {r['score']} | {r['fase']} | {r['bowl']} | {r['trend_ok']} | {r['vol_contract']} | {r['spring']} |\n"
with open('report.md', 'w') as f:
    f.write(md)
PYEOF
      - uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.md
